trigger_alarm:
  name: Trigger Alarm
  description: Trigger the scooter alarm for a specified duration
  target:
    entity:
      integration: sunshine
      domain: switch
  fields:
    duration:
      name: Duration
      description: Duration for the alarm (e.g., "5s", "10s", "30s")
      required: true
      example: "5s"
      selector:
        text:

get_state:
  name: Request State
  description: Request fresh telemetry/state data from the scooter
  target:
    entity:
      integration: sunshine
      domain: switch

set_destination:
  name: Set Destination
  description: Set a navigation destination on the scooter
  target:
    entity:
      integration: sunshine
      domain: device_tracker
  fields:
    latitude:
      name: Latitude
      description: Destination latitude
      required: true
      example: 52.520008
      selector:
        number:
          min: -90
          max: 90
          step: any
          mode: box
    longitude:
      name: Longitude
      description: Destination longitude
      required: true
      example: 13.404954
      selector:
        number:
          min: -180
          max: 180
          step: any
          mode: box
    address:
      name: Address
      description: Optional address label for the destination
      required: false
      example: "Brandenburger Tor, Berlin"
      selector:
        text:

clear_destination:
  name: Clear Destination
  description: Clear the current navigation destination
  target:
    entity:
      integration: sunshine
      domain: device_tracker
